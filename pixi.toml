[workspace]
channels = ["conda-forge"]
name = "ceos-ard-server"
platforms = ["osx-arm64", "win-64", "linux-64", "osx-64"]
version = "0.1.0"

[tasks]
dev = "uvicorn app.main:app --reload"

[dependencies]
fastapi = ">=0.116.1,<0.117"
uvicorn = ">=0.35.0,<0.36"
authlib = ">=1.6.1,<2"
httpx = ">=0.28.1,<0.29"
python-dotenv = ">=1.1.1,<2"
sqlalchemy = ">=2.0.41,<3"
itsdangerous = ">=2.2.0,<3"
pyjwt = ">=2.10.1,<3"
pandoc = "==3.6.2"
pandoc-crossref = "=0.3.18.1"
playwright = ">=1.54.2,<2"
strictyaml = ">=1.7.3,<2"
gitpython = ">=3.1.45,<4"

[feature.dev.dependencies]
ruff = ">=0.12.0,<0.13.0"
pytest = ">=8.3.0,<9.0.0"
pre-commit = ">=4.0.0,<5.0.0"

[feature.dev.tasks]
lint = "ruff check ."
format = "ruff format ."
lint-fix = "ruff check --fix ."
pre-commit-run = "pre-commit run --all-files"
pre-commit-install = "pre-commit install"
test = { cmd = "pytest test/ -v", env = { PYTHONPATH = "." } }

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[pypi-dependencies]
ceos-ard-cli = ">= 0.2.0,<0.3.0"
bibtexparser = "==2.0.0b8"
