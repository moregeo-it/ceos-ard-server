[workspace]
channels = ["conda-forge"]
name = "ceos-ard-server"
platforms = ["osx-arm64", "win-64", "linux-64", "osx-64"]
version = "0.1.0"

[tasks]
dev = "uvicorn app.main:app --reload"

[dependencies]
fastapi = ">=0.135.2,<0.136"
uvicorn = ">=0.42.0,<0.43"
authlib = ">=1.6.1,<2"
httpx = ">=0.28.1,<0.29"
python-dotenv = ">=1.1.1,<2"
sqlalchemy = ">=2.0.41,<3"
itsdangerous = ">=2.2.0,<3"
pyjwt = ">=2.10.1,<3"
pandoc = "==3.8.2.1"
pandoc-crossref = "==0.3.22"
playwright = ">=1.54.2,<2"
strictyaml = ">=1.7.3,<2"
PyYAML = ">=6.0,<7" # todo: replace usage with strictyaml once the CLI is more library friendly
pygit2 = ">=1.17.0,<2"
python-dateutil = ">=2.8.2,<3"

[feature.dev.dependencies]
ruff = ">=0.15.8,<0.16.0"
pytest = ">=9.0.2,<10.0.0"
pre-commit = ">=4.0.0,<5.0.0"

[feature.dev.tasks]
install-browser = "playwright install chromium --with-deps"
pre-commit = "pre-commit run --all-files"
pre-commit-install = "pre-commit install"
test = { cmd = "pytest test/ -v", env = { PYTHONPATH = "." } }

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[pypi-dependencies]
ceos-ard-cli = ">= 0.5.2,<0.6.0"
bibtexparser = "==2.0.0b9"
